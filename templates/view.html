<!DOCTYPE html>
<html>

<head>

<title>View Material</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="navbar">

<h1>JNV Prep Portal</h1>

<div>
<a href="/">Home</a>
<a href="/materials">Materials</a>
<a href="/logout">Logout</a>
</div>

</div>


<div class="viewer-container">

<h2>Viewing Material</h2>

<div id="pdf-viewer"></div>

<br>

<a href="/materials">Back to Materials</a>

</div>


<script type="module">

import * as pdfjsLib from "{{ url_for('static', filename='pdfjs/pdf.mjs') }}";

pdfjsLib.GlobalWorkerOptions.workerSrc = "{{ url_for('static', filename='pdfjs/pdf.worker.mjs') }}";

const url = "{{ url_for('static', filename='pdfs/' + filename) }}";
const viewer = document.getElementById('pdf-viewer');

pdfjsLib.getDocument(url).promise.then(function(pdf) {

    for (let i = 1; i <= pdf.numPages; i++) {

        pdf.getPage(i).then(function(page) {

            const scale = 1.5;
            const viewport = page.getViewport({scale: scale});

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');

            canvas.height = viewport.height;
            canvas.width = viewport.width;

            viewer.appendChild(canvas);

            page.render({
                canvasContext: context,
                viewport: viewport
            });

            const watermark = document.createElement('div');

            watermark.innerText = "{{ email }}";

            watermark.style.position = "absolute";
            watermark.style.top = "0";
            watermark.style.left = "0";
            watermark.style.width = "100%";
            watermark.style.height = "100%";

            watermark.style.display = "flex";
            watermark.style.flexWrap = "wrap";
            watermark.style.justifyContent = "center";
            watermark.style.alignItems = "center";

            watermark.style.pointerEvents = "none";

            watermark.style.fontSize = "22px";
            watermark.style.color = "rgba(0,0,0,0.15)";
            watermark.style.transform = "rotate(-25deg)";

            for(let i=0;i<40;i++){
                const span=document.createElement("span");
                span.innerText="{{ email }}";
                span.style.margin="40px";
                watermark.appendChild(span);
            }

            canvas.parentElement.style.position = "relative";
            canvas.parentElement.appendChild(watermark);

        });

    }

});

document.addEventListener('contextmenu', event => event.preventDefault());

document.addEventListener('keydown', function(e) {

    if (e.ctrlKey && (e.key === 'p' || e.key === 's' || e.key === 'u')) {
        e.preventDefault();
    }

    if (e.ctrlKey && e.shiftKey && e.key === 'I') {
        e.preventDefault();
    }

});

</script>

</body>
</html>
